# Dependabot configuration.
#
# - GitHub Actions: full version updates (already pinned to commit
#   SHAs, so each Dependabot PR rolls a single SHA forward).
# - Cargo: *security alerts only*. Version updates were disabled in
#   #48 because of the vendored rustyline pin; that decision stands.
#   Security alerts still surface as PRs because
#   `open-pull-requests-limit: 0` only suppresses version updates,
#   not advisory-driven ones.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:30"
      timezone: Etc/UTC
    # No routine version updates — only security advisories.
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "fix(deps)"
      include: "scope"
