name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  line-limit:
    name: Line Limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enforce Rust file line limit
        run: sh scripts/check_rs_line_limit.sh

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --no-deps -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - line-limit
      - format
      - clippy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --locked --workspace

      - name: Test installer flow
        run: sh scripts/test_install.sh

      - name: Check no_std compiler core
        run: cargo check --locked -p ush_compiler --no-default-features

      - name: Run no_std compiler tests
        run: cargo test --locked -p ush_compiler --no-default-features --lib

      - name: Run release tests
        run: cargo test --locked --workspace --release

      - name: Build benches
        run: cargo bench --locked -p ush_shell --no-run

      - name: Run async example
        run: |
          output="$(cargo run --locked -p ush --quiet -- examples/async.ush)"
          [ "$output" = "$(printf 'main\nafter\nworker')" ]

      - name: Run ADT example
        run: |
          output="$(cargo run --locked -p ush --quiet -- examples/adt.ush)"
          [ "$output" = "done" ]
