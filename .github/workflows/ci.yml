name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # weekly supply-chain rescan even when nothing changes
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  line-limit:
    name: Line Limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enforce Rust file line limit
        run: sh scripts/check_rs_line_limit.sh

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --no-deps -- -D warnings

  msrv:
    name: MSRV (rust-version)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read workspace rust-version
        id: msrv
        run: |
          version="$(awk '
            /^\[workspace.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 == "rust-version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          if [ -z "$version" ]; then
            echo "could not find rust-version in [workspace.package]" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install Rust ${{ steps.msrv.outputs.version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Check workspace against MSRV
        run: cargo check --locked --workspace --all-targets

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    needs:
      - clippy
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Run parser bench
        run: cargo bench --locked -p ush_shell --bench parser -- --output-format bencher | tee bench-output.txt

      - name: Run compile bench
        run: cargo bench --locked -p ush_compiler --bench compile -- --output-format bencher | tee -a bench-output.txt

      - name: Compare against baseline on main
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Criterion microbenchmarks
          tool: cargo
          output-file-path: bench-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: bench
          summary-always: true
          alert-threshold: "125%"
          fail-on-alert: ${{ github.event_name == 'pull_request' }}
          comment-on-alert: true
          alert-comment-cc-users: "@ubugeeei"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - line-limit
      - format
      - clippy
      - msrv
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Run workspace tests
        run: cargo test --locked --workspace

      - name: Test installer flow
        run: sh scripts/test_install.sh

      - name: Check no_std compiler core
        run: cargo check --locked -p ush_compiler --no-default-features

      - name: Run no_std compiler tests
        run: cargo test --locked -p ush_compiler --no-default-features --lib

      - name: Run release tests
        run: cargo test --locked --workspace --release

      - name: Build benches
        run: |
          cargo bench --locked -p ush_shell --no-run
          cargo bench --locked -p ush_compiler --no-run

      - name: Run async example
        run: |
          output="$(cargo run --locked -p ush --quiet -- examples/async.ush)"
          [ "$output" = "$(printf 'main\nafter\nworker')" ]

      - name: Run ADT example
        run: |
          output="$(cargo run --locked -p ush --quiet -- examples/adt.ush)"
          [ "$output" = "done" ]
