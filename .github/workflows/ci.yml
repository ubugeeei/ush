name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Enforce Rust file line limit
        run: sh scripts/check_rs_line_limit.sh

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy -p ush -p ush_shell -p ush_config -p ush_tooling --all-targets --no-deps -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Test installer flow
        run: sh scripts/test_install.sh

      - name: Check no_std compiler core
        run: cargo check -p ush_compiler --no-default-features

      - name: Run release tests
        run: cargo test --workspace --release

      - name: Build benches
        run: cargo bench -p ush_shell --no-run

      - name: Run async example
        run: |
          output="$(cargo run -p ush --quiet -- examples/async.ush)"
          [ "$output" = "$(printf 'main\nafter\nworker')" ]

      - name: Run ADT example
        run: |
          output="$(cargo run -p ush --quiet -- examples/adt.ush)"
          [ "$output" = "done" ]
