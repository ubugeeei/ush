name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to create, for example v0.1.0
        required: true
        type: string
      target_ref:
        description: Branch or commit SHA to tag
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref }}

      - name: Validate version
        run: |
          version="${{ inputs.version }}"

          if ! printf '%s\n' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "version must be a semantic version tag, for example v0.1.0" >&2
            exit 1
          fi

          cargo_version="$(awk '
            /^\[workspace.package\]$/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml
          )"
          if [ -z "$cargo_version" ]; then
            echo "could not read workspace package version from Cargo.toml" >&2
            exit 1
          fi
          expected="v$cargo_version"
          if [ "$version" != "$expected" ]; then
            echo "version must match workspace package version: expected $expected, got $version" >&2
            exit 1
          fi

      - name: Ensure tag does not already exist
        run: |
          version="${{ inputs.version }}"
          git fetch --tags origin

          if git show-ref --verify --quiet "refs/tags/$version"; then
            echo "tag already exists: $version" >&2
            exit 1
          fi

      - name: Create and push annotated tag
        run: |
          version="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$version" -m "Release $version"
          git push origin "refs/tags/$version"
