name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string
      target_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: main
        type: string
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      target_ref:
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ inputs.version || github.ref_name }}
  SOURCE_REF: ${{ inputs.target_ref || github.ref }}

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Validate release tag
        run: |
          version="${RELEASE_TAG}"

          if ! printf '%s\n' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "release tag must be a semantic version tag, for example v0.1.0" >&2
            exit 1
          fi

          cargo_version="$(awk '
            /^\[workspace.package\]$/ { in_workspace_package = 1; next }
            /^\[/ { in_workspace_package = 0 }
            in_workspace_package && $1 == "version" {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml
          )"
          if [ -z "$cargo_version" ]; then
            echo "could not read workspace package version from Cargo.toml" >&2
            exit 1
          fi

          expected="v$cargo_version"
          if [ "$version" != "$expected" ]; then
            echo "release tag must match workspace package version: expected $expected, got $version" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: preflight
    permissions:
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: ush-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: ush-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: ush-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: ush-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Run release tests on target
        run: cargo test --locked --release --workspace --target "${{ matrix.target }}"

      - name: Build release binaries
        run: cargo build --locked --release --target "${{ matrix.target }}" -p ush -p ush_lsp

      - name: Package release archive
        env:
          COPYFILE_DISABLE: "1"
        run: |
          package_dir="ush-${{ matrix.target }}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/ush" "$package_dir/ush"
          cp "target/${{ matrix.target }}/release/ush_lsp" "$package_dir/ush_lsp"
          cp README.md LICENSE "$package_dir/"
          tar -czf "${{ matrix.asset_name }}" "$package_dir"

      - name: Upload archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Attest release archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.asset_name }}

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Download release archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ush-*.tar.gz
          merge-multiple: true
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > sha256sums.txt

      - name: Smoke test installer with release artifact
        run: |
          cd release-artifacts
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin
          do
            asset="ush-$target.tar.gz"
            package_dir="ush-$target"

            test -f "$asset"
            grep -F "  $asset" sha256sums.txt >/dev/null

            tmpdir="$(mktemp -d)"
            tar -xzf "$asset" -C "$tmpdir"
            test -x "$tmpdir/$package_dir/ush"
            test -x "$tmpdir/$package_dir/ush_lsp"
            test -f "$tmpdir/$package_dir/README.md"
            test -f "$tmpdir/$package_dir/LICENSE"
            rm -rf "$tmpdir"
          done

          cd ..
          archive_path="$PWD/release-artifacts/ush-x86_64-unknown-linux-gnu.tar.gz"
          checksum_path="$PWD/release-artifacts/sha256sums.txt"
          home_dir="$(mktemp -d)"

          HOME="$home_dir" \
          PATH="/usr/bin:/bin" \
          SHELL=/bin/bash \
          sh install.sh \
            --bin-dir "$home_dir/bin" \
            --no-modify-path \
            --download-url "file://$archive_path" \
            --checksum-url "file://$checksum_path"

          "$home_dir/bin/ush" --version
          test -x "$home_dir/bin/ush_lsp"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/sha256sums.txt
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
