name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      target_ref:
        required: false
        type: string

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: ${{ inputs.version || github.ref_name }}
  SOURCE_REF: ${{ inputs.target_ref || github.ref }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: ush-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset_name: ush-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: ush-aarch64-apple-darwin.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target "${{ matrix.target }}" -p ush -p ush_lsp

      - name: Package release archive
        env:
          COPYFILE_DISABLE: "1"
        run: |
          package_dir="ush-${{ matrix.target }}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/ush" "$package_dir/ush"
          cp "target/${{ matrix.target }}/release/ush_lsp" "$package_dir/ush_lsp"
          cp README.md LICENSE "$package_dir/"
          tar -czf "${{ matrix.asset_name }}" "$package_dir"

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Attest release archive provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.asset_name }}

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: ush-*.tar.gz
          merge-multiple: true
          path: release-artifacts

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum *.tar.gz > sha256sums.txt

      - name: Smoke test installer with release artifact
        run: |
          archive_path="$PWD/release-artifacts/ush-x86_64-unknown-linux-gnu.tar.gz"
          checksum_path="$PWD/release-artifacts/sha256sums.txt"
          home_dir="$(mktemp -d)"

          HOME="$home_dir" \
          PATH="/usr/bin:/bin" \
          SHELL=/bin/bash \
          sh install.sh \
            --bin-dir "$home_dir/bin" \
            --no-modify-path \
            --download-url "file://$archive_path" \
            --checksum-url "file://$checksum_path"

          "$home_dir/bin/ush" --version

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/sha256sums.txt
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
