name: Secret scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Gitleaks compares against history, so a shallow clone
          # would skip secrets that were committed earlier.
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -eu
          version="8.21.2"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" | tar -xz gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository
        # `--no-banner` reduces log noise; `--redact` ensures any
        # matched secret string is not echoed back into the run log.
        run: gitleaks detect --source . --no-banner --redact --verbose
